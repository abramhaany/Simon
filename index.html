<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon — كونها الخاص</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --teal:#38d9c0;--gold:#f0c060;--purple:#9b6dff;
  --pink:#ff6eb4;--white:#dde4ff;--dim:#5a6080;--bg:#01020a;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;cursor:none;font-family:'Cairo',sans-serif;color:var(--white);user-select:none}

/* CURSOR */
#cur{position:fixed;width:14px;height:14px;border:2px solid var(--teal);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .15s,height .15s,border-color .2s,background .2s}
#cur.big{width:52px;height:52px;background:rgba(56,217,192,.06);border-color:var(--gold)}

/* THREE CANVAS */
#c3{position:fixed;inset:0;z-index:1}

/* WORMHOLE */
#wormCanvas{position:fixed;inset:0;z-index:70;pointer-events:none;opacity:0;transition:opacity .1s}
#wormCanvas.active{opacity:1}

/* INTRO SCREEN */
#intro{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;transition:opacity 1s}
#intro.out{opacity:0;pointer-events:none}
.intro-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.intro-title{font-family:'Bebas Neue';font-size:clamp(3rem,12vw,8rem);letter-spacing:.2em;color:transparent;-webkit-text-stroke:2px var(--teal);position:relative;z-index:1;animation:introGlow 2s ease-in-out infinite}
@keyframes introGlow{0%,100%{text-shadow:0 0 40px rgba(56,217,192,.3)}50%{text-shadow:0 0 80px rgba(56,217,192,.7),0 0 120px rgba(139,92,246,.4)}}
.intro-sub{font-size:clamp(1rem,3vw,1.3rem);color:var(--dim);margin-top:1rem;font-weight:300;letter-spacing:.08em;position:relative;z-index:1}
.intro-q{font-size:clamp(1.1rem,2.5vw,1.4rem);color:var(--white);margin-top:2.5rem;font-weight:700;position:relative;z-index:1}

/* PLANET PICKER */
#picker{display:flex;gap:1rem;margin-top:2rem;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.pick-btn{padding:.7rem 1.6rem;border-radius:50px;border:1.5px solid;background:transparent;font-family:'Cairo';font-weight:700;font-size:1rem;cursor:none;transition:all .3s;letter-spacing:.05em}
.pick-btn:hover{transform:scale(1.08);box-shadow:0 0 30px currentColor}

.start-btn{margin-top:2rem;padding:1rem 3rem;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:50px;font-family:'Cairo';font-weight:900;font-size:1.1rem;color:var(--bg);cursor:none;letter-spacing:.1em;position:relative;z-index:1;transition:transform .2s,box-shadow .2s;display:none}
.start-btn.show{display:block}
.start-btn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(56,217,192,.5)}

/* TOP UI */
#topUi{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:10;text-align:center;opacity:0;transition:opacity 1s;pointer-events:none}
#topUi.show{opacity:1}
#topUi .label{font-family:'Bebas Neue';font-size:.85rem;letter-spacing:.5em;color:rgba(255,255,255,.15)}
#topUi .uname{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:.3em;color:var(--teal);text-shadow:0 0 20px var(--teal);margin-top:.2rem}

/* HINT */
#hint{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:10;text-align:center;opacity:0;transition:opacity 1s;pointer-events:none}
#hint.show{opacity:1}
#hint p{font-size:.9rem;color:var(--dim);font-weight:300}
#hint .hdots{display:flex;justify-content:center;gap:5px;margin-top:.4rem}
#hint .hd{width:4px;height:4px;border-radius:50%;background:var(--teal);animation:hdb 1.4s ease-in-out infinite}
#hint .hd:nth-child(2){animation-delay:.2s}
#hint .hd:nth-child(3){animation-delay:.4s}
@keyframes hdb{0%,100%{opacity:.2}50%{opacity:1}}

/* PLANET LABEL (3D overlay) */
#planetHover{position:fixed;pointer-events:none;z-index:15;text-align:center;opacity:0;transition:opacity .3s;transform:translate(-50%,-120%)}
#planetHover .ph-name{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:.25em;text-shadow:0 0 20px currentColor}
#planetHover .ph-tap{font-size:.75rem;color:var(--dim);font-weight:300;margin-top:.2rem;letter-spacing:.1em}

/* PANEL */
#panel{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s}
#panel.open{opacity:1;pointer-events:all}
#panel::before{content:'';position:absolute;inset:0;background:rgba(1,2,10,.9);backdrop-filter:blur(8px)}
.pbox{position:relative;z-index:1;width:min(600px,94vw);border-radius:28px;padding:2.8rem 2.2rem;text-align:center;transform:scale(.8) translateY(60px);transition:transform .6s cubic-bezier(.34,1.56,.64,1);overflow:hidden;max-height:90vh;overflow-y:auto}
.pbox::-webkit-scrollbar{width:4px}
.pbox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
#panel.open .pbox{transform:scale(1) translateY(0)}
.pbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;animation:shim 2s ease-in-out infinite}
@keyframes shim{0%,100%{opacity:.4}50%{opacity:1}}
.pclose{position:absolute;top:1rem;left:1rem;width:32px;height:32px;border:1px solid rgba(255,255,255,.12);border-radius:50%;background:transparent;color:var(--dim);cursor:none;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .25s;z-index:2}
.pclose:hover{color:var(--teal);border-color:var(--teal)}
.pmini-3d{width:80px;height:80px;border-radius:50%;margin:0 auto 1.4rem;animation:spin3d 8s linear infinite}
@keyframes spin3d{to{filter:hue-rotate(20deg)}}
.ptitle{font-family:'Bebas Neue';font-size:3rem;letter-spacing:.2em;margin-bottom:.2rem}
.psub{font-size:.85rem;color:var(--dim);margin-bottom:2rem;letter-spacing:.05em}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.5rem}
.ccard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:1rem .85rem;text-align:right;transition:all .25s}
.ccard:hover{background:rgba(56,217,192,.05);border-color:rgba(56,217,192,.2);transform:translateY(-2px)}
.ci{font-size:1.5rem;display:block;margin-bottom:.4rem}
.ct{font-weight:900;font-size:.88rem;margin-bottom:.25rem}
.cb{font-size:.78rem;color:var(--dim);line-height:1.7;font-weight:300}
.pquote{font-size:.9rem;font-style:italic;line-height:1.8;border-top:1px solid rgba(255,255,255,.06);padding-top:1.2rem}
.twline{font-size:1rem;font-weight:700;color:var(--teal);min-height:1.5rem;margin-bottom:1.3rem;display:flex;align-items:center;justify-content:center;gap:4px}
.twc{display:inline-block;width:2px;height:1em;background:var(--teal);animation:twb .7s step-end infinite}
@keyframes twb{50%{opacity:0}}
.bbtn{background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;border:none;font-family:'Cairo';font-weight:900;font-size:1rem;padding:.8rem 2.2rem;border-radius:50px;cursor:none;transition:transform .2s,box-shadow .2s}
.bbtn:hover{transform:scale(1.06);box-shadow:0 0 40px rgba(56,217,192,.4)}

/* SPARKS */
.sp{position:fixed;pointer-events:none;z-index:200;border-radius:50%;animation:spkO .7s ease forwards}
@keyframes spkO{100%{transform:scale(0) translate(var(--dx),var(--dy));opacity:0}}

/* FX canvas */
#fxC{position:fixed;inset:0;z-index:90;pointer-events:none}
</style>
</head>
<body>
<div id="cur"></div>
<canvas id="c3"></canvas>
<canvas id="wormCanvas"></canvas>
<canvas id="fxC"></canvas>

<!-- INTRO -->
<div id="intro">
  <div class="intro-stars" id="introStars"></div>
  <div class="intro-title">SIMON</div>
  <div class="intro-sub">كونها الخاص — مرحباً بيكِ</div>
  <div class="intro-q">إنتِ Simon؟ اختاري كوكبك 🪐</div>
  <div id="picker">
    <button class="pick-btn" style="color:#38d9c0;border-color:#38d9c0" onclick="choosePlanet('earth')">🌍 الأرض الزرقا</button>
    <button class="pick-btn" style="color:#ff6eb4;border-color:#ff6eb4" onclick="choosePlanet('mars')">🔴 المريخ</button>
    <button class="pick-btn" style="color:#f0c060;border-color:#f0c060" onclick="choosePlanet('saturn')">🪐 زحل</button>
    <button class="pick-btn" style="color:#9b6dff;border-color:#9b6dff" onclick="choosePlanet('purple')">💜 الكوكب البنفسجي</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="launchUniverse()">🚀 ادخلي كونك</button>
</div>

<!-- TOP UI -->
<div id="topUi">
  <div class="label">✦ كون</div>
  <div class="uname" id="uname">SIMON</div>
</div>

<!-- HINT -->
<div id="hint">
  <p>دوسي على أي كوكب تسافري إليه</p>
  <div class="hdots"><div class="hd"></div><div class="hd"></div><div class="hd"></div></div>
</div>

<!-- PLANET HOVER LABEL -->
<div id="planetHover">
  <div class="ph-name" id="phName">—</div>
  <div class="ph-tap">اضغطي للدخول</div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="pbox" id="pbox"></div>
</div>

<!-- FW canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════
let chosenPlanet = null;
let scene3d, camera3d, renderer3d, animId;
let planets3d = [];       // [{mesh, data}]
let raycaster, mouse3d;
let hoveredPlanet = null;
let wormActive = false;

const mx = {x:0,y:0};
const cur = document.getElementById('cur');

// ══════════════════════════════════════════
// CURSOR
// ══════════════════════════════════════════
document.addEventListener('mousemove', e=>{
  mx.x=e.clientX; mx.y=e.clientY;
  cur.style.left=mx.x+'px'; cur.style.top=mx.y+'px';
});
document.querySelectorAll('button').forEach(b=>{
  b.addEventListener('mouseenter',()=>cur.classList.add('big'));
  b.addEventListener('mouseleave',()=>cur.classList.remove('big'));
});

// ══════════════════════════════════════════
// SPARKS
// ══════════════════════════════════════════
function sparks(x,y,cols){
  const c=cols||['#38d9c0','#9b6dff','#f0c060','#fff','#ff6eb4'];
  for(let i=0;i<14;i++){
    const el=document.createElement('div'); el.className='sp';
    const sz=Math.random()*8+3,ang=Math.random()*360,dist=Math.random()*90+40;
    el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${c[~~(Math.random()*c.length)]};--dx:${Math.cos(ang*Math.PI/180)*dist}px;--dy:${Math.sin(ang*Math.PI/180)*dist}px;opacity:1`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }
}
document.addEventListener('click',e=>sparks(e.clientX,e.clientY));

// ══════════════════════════════════════════
// INTRO MINI STARS
// ══════════════════════════════════════════
(()=>{
  const c=document.getElementById('introStars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    const sz=Math.random()*2+.5;
    s.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:rgba(200,220,255,${Math.random()*.6+.1});top:${Math.random()*100}%;left:${Math.random()*100}%;animation:hdb ${Math.random()*3+2}s ease-in-out infinite;animation-delay:${Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// ══════════════════════════════════════════
// PLANET PICKER
// ══════════════════════════════════════════
function choosePlanet(p){
  chosenPlanet=p;
  document.querySelectorAll('.pick-btn').forEach(b=>b.style.opacity='.4');
  event.target.style.opacity='1';
  event.target.style.transform='scale(1.1)';
  document.getElementById('startBtn').classList.add('show');
}

// ══════════════════════════════════════════
// LAUNCH
// ══════════════════════════════════════════
function launchUniverse(){
  const intro=document.getElementById('intro');
  intro.classList.add('out');
  setTimeout(()=>{intro.style.display='none'; initThree();}, 1000);
  document.getElementById('topUi').classList.add('show');
  document.getElementById('hint').classList.add('show');
}

// ══════════════════════════════════════════
// THREE.JS SETUP
// ══════════════════════════════════════════
function initThree(){
  const canvas=document.getElementById('c3');
  scene3d=new THREE.Scene();
  camera3d=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,2000);
  camera3d.position.set(0,0,18);
  renderer3d=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer3d.setSize(innerWidth,innerHeight);
  renderer3d.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer3d.shadowMap.enabled=true;

  // Resize
  window.addEventListener('resize',()=>{
    camera3d.aspect=innerWidth/innerHeight;
    camera3d.updateProjectionMatrix();
    renderer3d.setSize(innerWidth,innerHeight);
  });

  // Lights
  const ambient=new THREE.AmbientLight(0x111133,1.2);
  scene3d.add(ambient);
  const sun=new THREE.DirectionalLight(0xffffff,2.5);
  sun.position.set(15,10,8);
  scene3d.add(sun);
  const rimLight=new THREE.DirectionalLight(0x4488ff,.4);
  rimLight.position.set(-10,-5,-8);
  scene3d.add(rimLight);

  // Stars background
  buildStarField();
  // Nebula planes
  buildNebulae();
  // Planets
  buildPlanets();
  // Asteroid belt
  buildAsteroidBelt();
  // Raycaster
  raycaster=new THREE.Raycaster();
  mouse3d=new THREE.Vector2();

  document.addEventListener('mousemove',onMouseMove3d);
  document.getElementById('c3').addEventListener('click',onPlanetClick);

  animate3d();
}

// ── STAR FIELD ──
function buildStarField(){
  const geo=new THREE.BufferGeometry();
  const N=3000;
  const pos=new Float32Array(N*3);
  const cols=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=Math.random()*900+100;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=r*Math.cos(phi);
    const t=Math.random();
    cols[i*3]=.8+t*.2; cols[i*3+1]=.8+t*.15; cols[i*3+2]=1;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const mat=new THREE.PointsMaterial({size:.55,vertexColors:true,transparent:true,opacity:.9});
  scene3d.add(new THREE.Points(geo,mat));
}

// ── NEBULAE ──
function buildNebulae(){
  const cols=[0x6633ff,0x00aabb,0xff44aa,0x2244ff];
  cols.forEach((c,i)=>{
    const geo=new THREE.PlaneGeometry(400,400);
    const mat=new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.04,side:THREE.DoubleSide,depthWrite:false});
    const m=new THREE.Mesh(geo,mat);
    m.position.set((i%2?1:-1)*80,(i<2?1:-1)*60,-150+i*30);
    m.rotation.z=i*0.8;
    scene3d.add(m);
  });
}

// ── PLANET TEXTURES (canvas-based) ──
function makeTexture(fn){
  const cv=document.createElement('canvas');cv.width=512;cv.height=512;
  const ctx=cv.getContext('2d');
  fn(ctx,cv.width,cv.height);
  return new THREE.CanvasTexture(cv);
}

function earthTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.35,h*.3,10,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#5599ff'); g.addColorStop(.3,'#2255cc'); g.addColorStop(.6,'#112288'); g.addColorStop(1,'#040d3a');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  // continent blobs
  [[180,160,70,60,'#33aa55'],[280,220,50,40,'#228844'],[150,280,40,35,'#33aa55'],[320,150,35,30,'#44bb66']].forEach(([x,y,rx,ry,c])=>{
    ctx.fillStyle=c; ctx.globalAlpha=.7;
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,Math.random()*.5,0,Math.PI*2); ctx.fill();
  });
  // cloud swirls
  ctx.globalAlpha=.25; ctx.fillStyle='#ffffff';
  [[100,120,120,20],[300,200,100,15],[200,320,140,18]].forEach(([x,y,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(x,y,rx,ry,-.3,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
})}

function marsTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.35,h*.3,10,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#ff8866'); g.addColorStop(.4,'#cc4422'); g.addColorStop(.7,'#882200'); g.addColorStop(1,'#2a0808');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=.15;
  for(let i=0;i<60;i++){ctx.fillStyle='#ffaa88';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*8+2,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=.3; ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.ellipse(256,80,60,25,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
})}

function saturnBodyTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.35,h*.3,10,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#ffe0a0'); g.addColorStop(.3,'#ddb040'); g.addColorStop(.6,'#996600'); g.addColorStop(1,'#331a00');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=.2;
  for(let i=0;i<8;i++){ctx.strokeStyle=i%2?'#ffcc66':'#aa7700';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(0,h/8*(i+1));ctx.lineTo(w,h/8*(i+1));ctx.stroke()}
  ctx.globalAlpha=1;
})}

function purpleTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.35,h*.3,10,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#cc99ff'); g.addColorStop(.35,'#8844ee'); g.addColorStop(.65,'#441199'); g.addColorStop(1,'#0d0022');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=.18;
  for(let i=0;i<40;i++){ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*4+1,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=.3; ctx.strokeStyle='#bb88ff'; ctx.lineWidth=3;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(w*.5,h*.5,80+i*25,-.2,.8);ctx.stroke()}
  ctx.globalAlpha=1;
})}

function greenTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.35,h*.3,10,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#aaffaa'); g.addColorStop(.3,'#44cc44'); g.addColorStop(.6,'#116611'); g.addColorStop(1,'#020e02');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=.2;
  for(let i=0;i<50;i++){ctx.fillStyle='#66ff66';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*6+1,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
})}

function iceTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.4,h*.3,5,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#ddeeff'); g.addColorStop(.4,'#88bbee'); g.addColorStop(.7,'#3366aa'); g.addColorStop(1,'#051020');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=.25;
  for(let i=0;i<30;i++){ctx.strokeStyle='#aaccff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(Math.random()*w,Math.random()*h);ctx.lineTo(Math.random()*w,Math.random()*h);ctx.stroke()}
  ctx.globalAlpha=1;
})}

function goldTex(){return makeTexture((ctx,w,h)=>{
  const g=ctx.createRadialGradient(w*.35,h*.3,10,w*.5,h*.5,w*.5);
  g.addColorStop(0,'#fff0aa'); g.addColorStop(.3,'#ddaa22'); g.addColorStop(.6,'#885500'); g.addColorStop(1,'#1a0800');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=.2;
  for(let i=0;i<8;i++){ctx.strokeStyle='#ffcc44';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,h/8*(i+1)+20*Math.sin(i));ctx.bezierCurveTo(w*.3,h/8*(i+1)-30,w*.7,h/8*(i+1)+30,w,h/8*(i+1));ctx.stroke()}
  ctx.globalAlpha=1;
})}

// ── ATMOSPHERE SHADER GLOW ──
function makeAtmo(radius, color, opacity=0.18){
  const geo=new THREE.SphereGeometry(radius*1.12,32,32);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity,side:THREE.BackSide,depthWrite:false});
  return new THREE.Mesh(geo,mat);
}

// ── BUILD PLANETS ──
function buildPlanets(){
  const texMap={earth:earthTex(),mars:marsTex(),saturn:saturnBodyTex(),purple:purpleTex()};
  const chosen=chosenPlanet||'earth';
  const mainTex=texMap[chosen];
  const mainCol={earth:0x38d9c0,mars:0xff6644,saturn:0xf0c060,purple:0x9b6dff}[chosen];
  const mainEmit={earth:0x0022aa,mars:0x440000,saturn:0x332200,purple:0x220055}[chosen];
  const mainAtmoCol={earth:0x4488ff,mars:0xff4422,saturn:0xddaa00,purple:0x8833ff}[chosen];

  const configs=[
    {id:'main',pos:[0,0,0],r:2.8,tex:mainTex,emissive:mainEmit,emissiveI:.4,atmoCol:mainAtmoCol,rotY:.003,
     label:'SIMON',labelCol:mainCol,glow:mainCol,ring:false,
     data:{title:'SIMON',sub:'كوكبها الخاص — مركز الكون ده',col:mainCol,
      cards:[{i:'⚡',t:'نفس الطاقة',b:'بتلاقيها وحاجة فيك بتقول "ده الكلام" من غير ما تشرح'},{i:'🎯',t:'بتفهم بسرعة',b:'جملة وبتفهم — الناس التانية محتاجة كتير'},{i:'🔥',t:'طاقتها معدية',b:'بتيجي والجو بيتغير كله'},{i:'🌊',t:'من غير تمثيل',b:'صفر طاقة مزيفة — ده نادر'}],
      quote:'"إنتِي النوع من الناس اللي بيخلي معرفة حد تحس إنك لقيت حاجة كنت محتاجها"',tw:true,boom:false}},

    {id:'p2',pos:[-8,1.5,-3],r:1.4,tex:marsTex(),emissive:0x440000,emissiveI:.3,atmoCol:0xff4422,rotY:.005,
     label:'طاقتها',labelCol:0xff6eb4,glow:0xff6644,ring:false,
     data:{title:'طاقتها',sub:'حاجة مش كل الناس عندها',col:0xff6eb4,
      cards:[{i:'🔥',t:'بتغير الجو',b:'بتيجي في أي مكان والدنيا بتتغير'},{i:'⚡',t:'معدية',b:'مبسوطيتها بتعدي من غير ما تعرف'},{i:'🌟',t:'طبيعية',b:'مش بتتكلف، ده جزء منها'},{i:'🎯',t:'واضحة',b:'مش في الناس زيها كتير'}],
      quote:'"ناس معينة بتدخل المكان والمكان بيتغير — Simon منهم"',tw:false,boom:false}},

    {id:'p3',pos:[7,-.5,-2],r:1.1,tex:greenTex(),emissive:0x002200,emissiveI:.3,atmoCol:0x44cc44,rotY:.006,
     label:'فكرها',labelCol:0x88cc44,glow:0x44cc44,ring:false,
     data:{title:'فكرها',sub:'دماغ شايلة الدنيا بطريقتها',col:0x88cc44,
      cards:[{i:'💡',t:'زوايا مختلفة',b:'بتشوف حاجات الناس بتعدي عليها'},{i:'🧠',t:'دماغها تانية',b:'مش بتفكر زي الناس وده أحسن حاجة'},{i:'🎲',t:'غير متوقعة',b:'الكلام معاها دايماً ممتع'},{i:'🌊',t:'عميقة',b:'الكلام معاها مش سطحي أبداً'}],
      quote:'"الناس اللي بتفكر بشكل مختلف هم اللي بيغيروا الحاجات"',tw:false,boom:false}},

    {id:'p4',pos:[-5,-3,-5],r:1.8,tex:saturnBodyTex(),emissive:0x332200,emissiveI:.35,atmoCol:0xddaa00,rotY:.002,
     label:'ابتسامتها',labelCol:0xf0c060,glow:0xddaa00,ring:true,
     data:{title:'ابتسامتها',sub:'حاجة بتوصل قبل ما تتكلمي',col:0xf0c060,
      cards:[{i:'☀️',t:'بتضوي المكان',b:'مش كلام — ده حرفياً اللي بيحصل'},{i:'✨',t:'طبيعية',b:'مش مزيفة — بتيجي لوحدها'},{i:'🌟',t:'معدية',b:'لما بتبتسم الكل بيبتسم'},{i:'💫',t:'نادرة',b:'مش كل الناس عندها الابتسامة دي'}],
      quote:'"أجمل الحاجات هي اللي بتحصل من غير تخطيط"',tw:false,boom:false}},

    {id:'p5',pos:[6,3,-6],r:.9,tex:iceTex(),emissive:0x001133,emissiveI:.3,atmoCol:0x4488ff,rotY:.008,
     label:'صداقتها',labelCol:0x8899ff,glow:0x4488ff,ring:false,
     data:{title:'صداقتها',sub:'النوع اللي بيفرق فعلاً',col:0x8899ff,
      cards:[{i:'🤝',t:'حقيقية',b:'مش شكلية — بتحس إنها صادقة'},{i:'🌊',t:'مريحة',b:'معها مش لازم تتكلف'},{i:'⚡',t:'متشابهين',b:'نفس النكات ونفس الردود'},{i:'🎯',t:'مبسوط بيها',b:'مبسوط إني عرفتها'}],
      quote:'"أحسن حاجة في الحياة هي الناس اللي بتخليك تبقى أنت"',tw:false,boom:false}},

    {id:'p6',pos:[2,-4.5,-4],r:.75,tex:goldTex(),emissive:0x221100,emissiveI:.3,atmoCol:0xffaa00,rotY:.01,
     label:'القمر',labelCol:0xf0c060,glow:0xffaa00,ring:false,
     data:{title:'القمر',sub:'اللي بيضوي من غير ما يعرف',col:0xf0c060,
      cards:[{i:'🌙',t:'زي القمر',b:'مش بيضوا بنورهم بس بيخلوا كل حاجة أجمل'},{i:'✨',t:'هادية',b:'حضورها كافي من غير ما تعمل حاجة'},{i:'💫',t:'ثابتة',b:'دايماً موجودة زي القمر في السما'},{i:'🌟',t:'جميلة',b:'جمال طبيعي من غير تكليف'}],
      quote:'"في ناس بيكونوا زي القمر — بيخلوا كل حاجة حواليهم تبان أجمل"',tw:true,boom:true}},
  ];

  configs.forEach(cfg=>{
    const geo=new THREE.SphereGeometry(cfg.r,64,64);
    const mat=new THREE.MeshPhongMaterial({
      map:cfg.tex,
      emissive:new THREE.Color(cfg.emissive),
      emissiveIntensity:cfg.emissiveI,
      shininess:30,
      specular:new THREE.Color(0x334466)
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(...cfg.pos);
    mesh.castShadow=true;
    scene3d.add(mesh);

    // Atmosphere
    const atmo=makeAtmo(cfg.r,cfg.atmoCol,.16);
    mesh.add(atmo);

    // Second atmosphere layer
    const atmo2=makeAtmo(cfg.r,cfg.atmoCol,.07);
    atmo2.scale.setScalar(1.06);
    mesh.add(atmo2);

    // Rings (Saturn-style)
    if(cfg.ring){
      const rGeo=new THREE.RingGeometry(cfg.r*1.4,cfg.r*2.2,64);
      const rMat=new THREE.MeshBasicMaterial({color:0xddaa44,transparent:true,opacity:.35,side:THREE.DoubleSide,depthWrite:false});
      const ring=new THREE.Mesh(rGeo,rMat);
      ring.rotation.x=Math.PI/2.5;
      mesh.add(ring);

      // Ring glow
      const rg2=new THREE.RingGeometry(cfg.r*1.3,cfg.r*2.4,64);
      const rm2=new THREE.MeshBasicMaterial({color:0xffcc66,transparent:true,opacity:.12,side:THREE.DoubleSide,depthWrite:false});
      const rring2=new THREE.Mesh(rg2,rm2);
      rring2.rotation.x=Math.PI/2.5;
      mesh.add(rring2);
    }

    // Moon for main planet
    if(cfg.id==='main'){
      const mGeo=new THREE.SphereGeometry(.55,32,32);
      const mMat=new THREE.MeshPhongMaterial({
        map:makeTexture((ctx,w,h)=>{
          const g=ctx.createRadialGradient(w*.38,h*.3,5,w*.5,h*.5,w*.5);
          g.addColorStop(0,'#e8e0c8');g.addColorStop(.45,'#b8b090');g.addColorStop(.8,'#707060');g.addColorStop(1,'#3a3a30');
          ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
          ctx.globalAlpha=.3;
          for(let i=0;i<20;i++){ctx.fillStyle='#554';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*12+4,0,Math.PI*2);ctx.fill()}
          ctx.globalAlpha=1;
        }),
        shininess:10,emissive:new THREE.Color(0x111100),emissiveIntensity:.2
      });
      const moon=new THREE.Mesh(mGeo,mMat);
      // orbit pivot
      const pivot=new THREE.Object3D();
      pivot.add(moon);
      moon.position.set(cfg.r+1.8,0,0);
      mesh.add(pivot);
      mesh._moonPivot=pivot;
      mesh._moon=moon;
    }

    planets3d.push({mesh,cfg});
  });

  // Camera slow drift
  camera3d.position.set(0,0,18);
}

// ── ASTEROID BELT ──
function buildAsteroidBelt(){
  for(let i=0;i<200;i++){
    const r=Math.random()*.25+.05;
    const geo=new THREE.SphereGeometry(r,8,8);
    const mat=new THREE.MeshPhongMaterial({color:new THREE.Color(Math.random()*.1+.15,Math.random()*.1+.1,Math.random()*.15+.12)});
    const m=new THREE.Mesh(geo,mat);
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*3+10;
    m.position.set(Math.cos(angle)*dist,Math.random()*2-1,Math.sin(angle)*dist-15);
    m._roidAngle=angle;
    m._roidDist=dist;
    m._roidSpeed=Math.random()*.001+.0003;
    scene3d.add(m);
    planets3d.push({mesh:m,cfg:null,isRoid:true});
  }
}

// ── MOUSE MOVE ──
function onMouseMove3d(e){
  mouse3d.x=(e.clientX/innerWidth)*2-1;
  mouse3d.y=-(e.clientY/innerHeight)*2+1;
}

// ── PLANET CLICK ──
function onPlanetClick(e){
  if(wormActive||document.getElementById('panel').classList.contains('open'))return;
  raycaster.setFromCamera(mouse3d,camera3d);
  const meshes=planets3d.filter(p=>!p.isRoid).map(p=>p.mesh);
  const hits=raycaster.intersectObjects(meshes,true);
  if(!hits.length)return;
  let root=hits[0].object;
  while(root.parent&&root.parent!==scene3d)root=root.parent;
  const pd=planets3d.find(p=>p.mesh===root);
  if(pd&&pd.cfg&&pd.cfg.data){
    triggerWormhole(e.clientX,e.clientY,pd.cfg.data);
  }
}

// ── HOVER ──
function checkHover(){
  if(wormActive||document.getElementById('panel').classList.contains('open'))return;
  raycaster.setFromCamera(mouse3d,camera3d);
  const meshes=planets3d.filter(p=>!p.isRoid).map(p=>p.mesh);
  const hits=raycaster.intersectObjects(meshes,true);
  const hoverEl=document.getElementById('planetHover');
  if(hits.length){
    let root=hits[0].object;
    while(root.parent&&root.parent!==scene3d)root=root.parent;
    const pd=planets3d.find(p=>p.mesh===root);
    if(pd&&pd.cfg){
      cur.classList.add('big');
      hoverEl.style.opacity='1';
      hoverEl.style.left=mx.x+'px';
      hoverEl.style.top=mx.y+'px';
      const nm=document.getElementById('phName');
      nm.textContent=pd.cfg.label;
      nm.style.color='#'+pd.cfg.labelCol.toString(16).padStart(6,'0');
      hoveredPlanet=pd;
    }
  } else {
    cur.classList.remove('big');
    hoverEl.style.opacity='0';
    hoveredPlanet=null;
  }
}

// ── WORMHOLE ──
const wormC=document.getElementById('wormCanvas');
const wctx=wormC.getContext('2d');
let wormFrame=0,wormCb=null;

function triggerWormhole(cx,cy,data){
  if(wormActive)return;
  wormActive=true;
  wormC.width=innerWidth; wormC.height=innerHeight;
  wormC.classList.add('active');
  wormFrame=0;
  document.getElementById('hint').classList.remove('show');

  const totalFrames=80;
  const col1='#38d9c0',col2='#9b6dff',col3='#f0c060',col4='#ff6eb4';

  function drawWorm(){
    const t=wormFrame/totalFrames;
    wctx.clearRect(0,0,wormC.width,wormC.height);

    // dark bg fades in
    wctx.fillStyle=`rgba(1,2,10,${t<.4?t*2.5:.95})`;
    wctx.fillRect(0,0,wormC.width,wormC.height);

    const cx2=wormC.width/2, cy2=wormC.height/2;
    const maxR=Math.sqrt(cx2*cx2+cy2*cy2)*1.5;

    // TUNNEL RINGS — zoom toward viewer
    const numRings=18;
    for(let i=0;i<numRings;i++){
      const phase=((i/numRings)+t*3)%1;
      const r=phase*maxR*(1+t*2);
      const alpha=Math.max(0,(1-phase)*.8)*Math.min(t*4,1);
      const hue=(i/numRings)*360+t*200;
      wctx.strokeStyle=`hsla(${hue},90%,70%,${alpha})`;
      wctx.lineWidth=2+phase*6;
      wctx.beginPath();
      wctx.arc(cx2,cy2,r,0,Math.PI*2);
      wctx.stroke();
    }

    // STREAKS — radial speed lines
    if(t>.1){
      const streakCount=60;
      for(let i=0;i<streakCount;i++){
        const ang=(i/streakCount)*Math.PI*2+t*.5;
        const spd=t*t;
        const r1=(i%3*.1+.2)*maxR*spd;
        const r2=r1+maxR*.08*(1+t);
        const alpha=Math.min(spd*2,.7);
        const cols=[col1,col2,col3,col4];
        wctx.strokeStyle=cols[i%4].replace(')',`,${alpha})`).replace('rgb','rgba').replace('#','rgba(').replace('rgba(','');
        // simple approach
        wctx.strokeStyle=`rgba(255,255,255,${alpha*.5})`;
        if(i%4===0)wctx.strokeStyle=`rgba(56,217,192,${alpha})`;
        if(i%4===1)wctx.strokeStyle=`rgba(155,109,255,${alpha})`;
        if(i%4===2)wctx.strokeStyle=`rgba(240,192,96,${alpha})`;
        wctx.lineWidth=1.5;
        wctx.beginPath();
        wctx.moveTo(cx2+Math.cos(ang)*r1,cy2+Math.sin(ang)*r1);
        wctx.lineTo(cx2+Math.cos(ang)*r2,cy2+Math.sin(ang)*r2);
        wctx.stroke();
      }
    }

    // CENTRAL GLOW
    if(t>.3){
      const gAlpha=Math.min((t-.3)*3,1);
      const g=wctx.createRadialGradient(cx2,cy2,0,cx2,cy2,maxR*t*.8);
      g.addColorStop(0,`rgba(255,255,255,${gAlpha*.9})`);
      g.addColorStop(.1,`rgba(56,217,192,${gAlpha*.6})`);
      g.addColorStop(.3,`rgba(155,109,255,${gAlpha*.3})`);
      g.addColorStop(1,'rgba(1,2,10,0)');
      wctx.fillStyle=g;
      wctx.fillRect(0,0,wormC.width,wormC.height);
    }

    // WHITE FLASH at end
    if(t>.8){
      const fa=(t-.8)*5;
      wctx.fillStyle=`rgba(255,255,255,${fa})`;
      wctx.fillRect(0,0,wormC.width,wormC.height);
    }

    wormFrame++;
    if(wormFrame<totalFrames){
      requestAnimationFrame(drawWorm);
    } else {
      wormC.classList.remove('active');
      wctx.clearRect(0,0,wormC.width,wormC.height);
      wormActive=false;
      openPanel(data);
    }
  }
  drawWorm();
}

// ── PANEL ──
function openPanel(data){
  const box=document.getElementById('pbox');
  const col='#'+data.col.toString(16).padStart(6,'0');
  const miniGrad={
    0x38d9c0:'radial-gradient(circle at 38% 32%,#88bbff,#3366dd 35%,#112299 60%,#040d3a)',
    0xff6eb4:'radial-gradient(circle at 35% 32%,#ffaa88,#cc5522 40%,#7a2210 70%)',
    0x88cc44:'radial-gradient(circle at 38% 32%,#ddffaa,#88cc44 40%,#336611 70%)',
    0xf0c060:'radial-gradient(circle at 35% 30%,#fff0aa,#ddaa22 40%,#885500 70%)',
    0x8899ff:'radial-gradient(circle at 38% 32%,#aabbff,#5566dd 40%,#223388 70%)',
  };
  const mg=miniGrad[data.col]||`radial-gradient(circle at 38% 32%,${col},#220033 70%)`;

  box.style.background=`linear-gradient(145deg,rgba(5,5,25,.97),rgba(2,2,12,.99))`;
  box.style.border=`1px solid ${col}33`;
  box.style.boxShadow=`0 0 100px ${col}0a,0 40px 80px rgba(0,0,0,.8)`;
  box.querySelector&&(()=>{})();

  let cardHtml=data.cards.map(c=>`
    <div class="ccard">
      <span class="ci">${c.i}</span>
      <div class="ct" style="color:${col}">${c.t}</div>
      <p class="cb">${c.b}</p>
    </div>`).join('');

  box.innerHTML=`
    <button class="pclose" onclick="closePanel()">✕</button>
    <div class="pmini-3d" style="background:${mg};box-shadow:0 0 40px ${col}66"></div>
    <div class="ptitle" style="color:${col}">${data.title}</div>
    <div class="psub">${data.sub}</div>
    <div class="cgrid">${cardHtml}</div>
    ${data.tw?`<div class="twline"><span id="twEl"></span><span class="twc" style="background:${col}"></span></div>`:''}
    <div class="pquote" style="color:${col}">${data.quote}</div>
    ${data.boom?`<br><button class="bbtn" onclick="boom()">✨ احتفل بيها ✨</button>`:''}
  `;

  box.querySelectorAll('button').forEach(b=>{
    b.addEventListener('mouseenter',()=>cur.classList.add('big'));
    b.addEventListener('mouseleave',()=>cur.classList.remove('big'));
  });

  // shimmer color
  box.style.setProperty('--acc',col);
  box.style.cssText+=`;--accent:${col}`;

  document.getElementById('panel').classList.add('open');
  if(data.tw)startTw(col);
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('hint').classList.add('show');
  twOn=false;
}
document.getElementById('panel').addEventListener('click',function(e){if(e.target===this)closePanel()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});

// ── TYPEWRITER ──
const phrases=['مبسوط إني عرفتك 🙂','إنتِ شبهي بشكل غريب ⚡','إنتِ حلوة جداً كده 🌟','Simon = نادرة من أصلها 🔥','الكون اتحسن لما إنتِ فيه 🌌','مبسوط بي كده وبيكِ كده ✨','مش في ناس زيكِ كتير 💫'];
let tpi=0,tci=0,tdel=false,twOn=false;
function startTw(col){
  if(twOn)return;twOn=true;tpi=0;tci=0;tdel=false;
  const el=document.getElementById('twEl');if(!el)return;
  el.textContent='';
  const twc=document.querySelector('.twc');
  if(twc&&col)twc.style.background=col;
  twStep();
}
function twStep(){
  if(!twOn)return;
  const el=document.getElementById('twEl');if(!el){twOn=false;return}
  const ph=phrases[tpi];
  if(!tdel){el.textContent=ph.slice(0,++tci);if(tci===ph.length){tdel=true;setTimeout(twStep,2200);return}}
  else{el.textContent=ph.slice(0,--tci);if(tci===0){tdel=false;tpi=(tpi+1)%phrases.length}}
  setTimeout(twStep,tdel?32:76);
}

// ── FIREWORKS ──
const fxC=document.getElementById('fxC'),fctx=fxC.getContext('2d');
let fp=[],fgo=false;
function rfx(){fxC.width=innerWidth;fxC.height=innerHeight}rfx();window.addEventListener('resize',rfx);
function burst(x,y){const cols=['#38d9c0','#9b6dff','#f0c060','#fff','#ff6eb4','#4488ff','#ffaa44'];for(let i=0;i<150;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*14+2;fp.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*6,alpha:1,color:cols[~~(Math.random()*cols.length)],r:Math.random()*4.5+1,decay:.011+Math.random()*.013,grav:.14})}}
function fxLoop(){if(!fgo)return;fctx.clearRect(0,0,fxC.width,fxC.height);fp=fp.filter(p=>p.alpha>.01);fp.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.98;p.alpha-=p.decay;fctx.beginPath();fctx.arc(p.x,p.y,p.r,0,Math.PI*2);fctx.fillStyle=p.color;fctx.globalAlpha=p.alpha;fctx.fill()});fctx.globalAlpha=1;requestAnimationFrame(fxLoop)}
function boom(){fgo=true;fxLoop();let n=0;const id=setInterval(()=>{burst(Math.random()*fxC.width,Math.random()*fxC.height*.7);n++;if(n>=25){clearInterval(id);setTimeout(()=>{fgo=false;fctx.clearRect(0,0,fxC.width,fxC.height)},3500)}},190)}

// ── ANIMATE ──
let camT=0;
function animate3d(){
  animId=requestAnimationFrame(animate3d);
  camT+=.0003;

  // gentle camera drift
  camera3d.position.x=Math.sin(camT*.7)*1.2;
  camera3d.position.y=Math.cos(camT*.5)*.8;
  camera3d.lookAt(0,0,0);

  // rotate planets
  planets3d.forEach(({mesh,cfg,isRoid})=>{
    if(isRoid){
      mesh._roidAngle+=mesh._roidSpeed;
      mesh.position.x=Math.cos(mesh._roidAngle)*mesh._roidDist;
      mesh.position.z=Math.sin(mesh._roidAngle)*mesh._roidDist-15;
      mesh.rotation.x+=.01;mesh.rotation.y+=.008;
      return;
    }
    if(cfg){mesh.rotation.y+=cfg.rotY||.003}
    if(mesh._moonPivot)mesh._moonPivot.rotation.y+=.012;
  });

  checkHover();
  renderer3d.render(scene3d,camera3d);
}
