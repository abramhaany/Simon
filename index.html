<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لا تصمت — فلسطين</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#c0392b;--green:#1a5c2a;--gold:#c9a84c;--white:#f0ebe0;}
html{scroll-behavior:smooth;}
body{background:#000;color:var(--white);font-family:"Cairo",sans-serif;overflow-x:hidden;cursor:none;}
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--red);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur2{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid rgba(192,57,43,.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s ease;}
#bg{position:fixed;inset:0;z-index:0;}
/* MUSIC BAR */
#mbar{position:fixed;bottom:1.5rem;left:1.5rem;z-index:600;display:none;align-items:center;gap:.75rem;background:rgba(0,0,0,.8);border:1px solid rgba(192,57,43,.4);border-radius:50px;padding:.6rem 1.2rem .6rem .7rem;backdrop-filter:blur(16px);cursor:pointer;transition:all .3s;}
#mbar:hover{border-color:rgba(192,57,43,.8);}
#mico{width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;animation:mpulse 1.5s ease-in-out infinite;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}50%{box-shadow:0 0 0 8px rgba(192,57,43,0);}}
#mico.off{animation:none;background:#333;}
.mbars{display:flex;align-items:flex-end;gap:2px;}
.mb{width:3px;border-radius:2px;background:var(--red);animation:ba 1s ease-in-out infinite;}
.mb:nth-child(1){height:8px;}.mb:nth-child(2){height:14px;animation-delay:.15s;}.mb:nth-child(3){height:6px;animation-delay:.3s;}.mb:nth-child(4){height:12px;animation-delay:.1s;}
@keyframes ba{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}
#mbar.off .mb{animation:none;transform:scaleY(.3);}
.minfo{display:flex;flex-direction:column;}
.mtitle{font-size:.72rem;font-weight:700;color:var(--white);}
.martist{font-size:.62rem;color:#888;}
/* SPLASH */
#splash{position:fixed;inset:0;z-index:900;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .8s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-wrap{text-align:center;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem;position:relative;z-index:2;}
.sp-flag{display:flex;width:70px;height:5px;border-radius:4px;overflow:hidden;margin:0 auto;}
.sf1{flex:1;background:#111;}.sf2{flex:1;background:#fff;}.sf3{flex:1;background:#007a3d;}.sf4{flex:1;background:#ce1126;}
.sp-key{font-size:4.5rem;animation:sk 2.5s ease-in-out infinite;}
@keyframes sk{0%,100%{transform:rotate(-8deg) scale(1);}50%{transform:rotate(8deg) scale(1.1);}}
.sp-h1{font-family:"Amiri",serif;font-size:clamp(2.5rem,9vw,6rem);line-height:.95;font-weight:700;}
.sp-h1 em{font-style:normal;color:var(--red);display:block;}
.sp-sub{font-size:.9rem;color:#777;}
.sp-btn{display:inline-flex;align-items:center;gap:.8rem;background:var(--red);color:#fff;border:none;padding:1rem 2.8rem;border-radius:50px;font-family:"Cairo",sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s;animation:bg 2s ease-in-out infinite;}
@keyframes bg{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.5);}50%{box-shadow:0 0 0 18px rgba(192,57,43,0);}}
.sp-btn:hover{transform:scale(1.05);}
.sp-note{font-size:.72rem;color:#555;}
.sp-pt{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.spt{position:absolute;border-radius:50%;animation:spf linear infinite;}
@keyframes spf{0%{transform:translateY(100vh);opacity:0;}10%{opacity:.6;}90%{opacity:.3;}100%{transform:translateY(-10vh);opacity:0;}}
/* LOADER */
#loader{position:fixed;inset:0;z-index:800;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;}
.lkey{font-size:3.5rem;animation:sk 2s ease-in-out infinite;}
.lbar{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.lfill{height:100%;background:var(--red);width:0;transition:width .08s;}
.ltxt{font-size:.75rem;color:#555;letter-spacing:.2em;}
/* PAGE */
.page{position:relative;z-index:10;}
#hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;pointer-events:none;}
.hl{font-size:.7rem;letter-spacing:.4em;color:var(--gold);opacity:0;animation:fu .8s ease .3s forwards;}
.hh{font-family:"Amiri",serif;font-size:clamp(3rem,11vw,9rem);line-height:.9;font-weight:700;margin-top:1rem;opacity:0;animation:fu 1s ease .6s forwards;}
.hh em{font-style:normal;color:var(--red);display:block;position:relative;}
.hh em::after{content:"";position:absolute;bottom:6px;right:0;width:0;height:4px;background:var(--red);border-radius:4px;animation:lg 1.2s ease 1.8s forwards;}
@keyframes lg{to{width:100%;}}
.hh small{font-size:.32em;font-family:"Cairo",sans-serif;font-weight:300;color:#666;display:block;margin-top:.8rem;}
.hcw{margin-top:3rem;opacity:0;animation:fu 1s ease 1s forwards;}
.hcg{display:inline-grid;grid-template-columns:repeat(3,1fr);background:rgba(255,255,255,.04);border:1px solid rgba(192,57,43,.2);border-radius:18px;overflow:hidden;backdrop-filter:blur(18px);}
.hci{padding:1.8rem 2.5rem;text-align:center;border-left:1px solid rgba(255,255,255,.07);}
.hci:last-child{border-left:none;}
.hcn{font-size:clamp(1.6rem,3.5vw,2.8rem);font-weight:900;color:var(--red);display:block;line-height:1;}
.hcl{font-size:.7rem;color:#777;margin-top:.3rem;}
.shi{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fu 1s ease 2s forwards;pointer-events:all;}
.shl{width:1px;height:48px;background:linear-gradient(to bottom,rgba(255,255,255,.5),transparent);animation:sp2 2s ease-in-out infinite;}
@keyframes sp2{0%,100%{opacity:.3;}50%{opacity:1;}}
.sht{font-size:.6rem;letter-spacing:.3em;color:#555;}
@keyframes fu{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
/* GLOBE */
#gsec{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#gcan{position:absolute;inset:0;}
.gtxt{position:relative;z-index:2;text-align:center;max-width:580px;padding:2rem;}
.gtit{font-family:"Amiri",serif;font-size:clamp(1.8rem,4vw,3.2rem);line-height:1.2;opacity:0;transform:translateY(28px);transition:all .8s;}
.gtit.vis{opacity:1;transform:translateY(0);}
.gsub{font-size:.95rem;color:#888;margin-top:1rem;line-height:1.8;opacity:0;transform:translateY(18px);transition:all .8s .2s;}
.gsub.vis{opacity:1;transform:translateY(0);}
/* STATS */
#stats{padding:6rem 2rem;max-width:1200px;margin:0 auto;}
.stit{font-family:"Amiri",serif;font-size:clamp(2rem,4vw,3rem);text-align:center;margin-bottom:.5rem;}
.ssub{text-align:center;color:#777;font-size:.88rem;margin-bottom:4rem;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;}
.sc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:2.5rem 2rem;position:relative;overflow:hidden;opacity:0;transform:translateY(45px) rotateX(12deg);transition:all .3s;}
.sc.vis{animation:cin .65s ease forwards;}
@keyframes cin{to{opacity:1;transform:translateY(0) rotateX(0);}}
.sc:hover{box-shadow:0 20px 50px rgba(192,57,43,.2);transform:translateY(-7px) !important;border-color:rgba(192,57,43,.3);}
.sico{font-size:2.3rem;margin-bottom:1rem;}
.snum{font-size:clamp(2.5rem,5vw,4rem);font-weight:900;color:var(--red);line-height:1;display:block;}
.slbl{font-size:.85rem;color:#888;margin-top:.5rem;line-height:1.6;}
.sbar{margin-top:1.5rem;height:3px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.sfil{height:100%;background:linear-gradient(to left,var(--red),rgba(192,57,43,.3));width:0;transition:width 1.8s cubic-bezier(.22,1,.36,1);}
/* MARQUEE */
#mq{padding:3.5rem 0;overflow:hidden;background:rgba(192,57,43,.04);border-top:1px solid rgba(192,57,43,.12);border-bottom:1px solid rgba(192,57,43,.12);}
.mqt{display:flex;gap:3rem;white-space:nowrap;animation:mqa 38s linear infinite;}
.mqt:hover{animation-play-state:paused;}
@keyframes mqa{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.mqi{font-family:"Amiri",serif;font-size:clamp(1rem,2vw,1.2rem);color:#999;white-space:nowrap;display:inline-flex;align-items:center;gap:.8rem;flex-shrink:0;}
.mqi span{color:var(--red);}
/* MEMORIAL */
#mem{padding:7rem 2rem;max-width:1200px;margin:0 auto;}
.metit{font-family:"Amiri",serif;font-size:clamp(1.8rem,4vw,3rem);text-align:center;margin-bottom:.6rem;}
.mesub{text-align:center;color:#777;font-size:.88rem;margin-bottom:3rem;}
.megrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.7rem;}
.mc{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.8rem .4rem;text-align:center;position:relative;overflow:hidden;opacity:0;transform:rotateY(90deg);border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);transition:all .3s;}
.mc.vis{animation:mcf .55s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes mcf{to{opacity:1;transform:rotateY(0);}}
.mc:hover{border-color:rgba(192,57,43,.5);background:rgba(192,57,43,.09);transform:scale(1.08) !important;}
.mcem{font-size:1.8rem;margin-bottom:.4rem;}
.mcn{font-size:.68rem;font-weight:700;line-height:1.3;}
.mca{font-size:.6rem;color:#666;margin-top:.15rem;}
.mcc{position:absolute;bottom:4px;right:6px;font-size:.8rem;animation:fl 2.2s ease-in-out infinite;}
@keyframes fl{0%,100%{opacity:.7;}35%{opacity:1;transform:scale(1.15) rotate(-3deg);}70%{opacity:.75;transform:scale(.93) rotate(2deg);}}
/* TIMELINE */
#tl{padding:7rem 2rem;max-width:880px;margin:0 auto;position:relative;}
.tlh{font-family:"Amiri",serif;font-size:clamp(1.8rem,4vw,3rem);text-align:center;margin-bottom:4rem;}
.tlsp{position:absolute;right:calc(50% - 1px);top:8rem;bottom:3rem;width:2px;background:linear-gradient(to bottom,transparent,var(--red) 20%,rgba(26,92,42,.5) 80%,transparent);}
.tlev{display:grid;grid-template-columns:1fr 20px 1fr;gap:1.5rem;align-items:start;margin-bottom:3.5rem;opacity:0;}
.tlev.fl{transform:translateX(-55px);}
.tlev.fr{transform:translateX(55px);}
.tlev.vis{animation:tlin .65s ease forwards;}
@keyframes tlin{to{opacity:1;transform:translateX(0);}}
.tldot{width:14px;height:14px;border-radius:50%;background:var(--red);margin-top:.8rem;box-shadow:0 0 0 4px rgba(192,57,43,.2),0 0 18px rgba(192,57,43,.55);justify-self:center;}
.tlbox{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:1.4rem 1.5rem;transition:all .3s;}
.tlbox:hover{background:rgba(192,57,43,.07);border-color:rgba(192,57,43,.3);}
.tlyr{font-size:.68rem;color:var(--gold);font-weight:700;letter-spacing:.15em;margin-bottom:.35rem;}
.tltt{font-family:"Amiri",serif;font-size:1.1rem;margin-bottom:.45rem;}
.tltx{font-size:.82rem;color:#888;line-height:1.8;}
/* VOICE */
#voice{padding:7rem 2rem;background:#0a0a0a;}
#voice .inn{max-width:820px;margin:0 auto;text-align:center;}
.vtit{font-family:"Amiri",serif;font-size:clamp(2rem,4vw,3rem);margin-bottom:1rem;}
.vdsc{color:#888;margin-bottom:3.5rem;line-height:1.8;}
.vstps{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1.2rem;text-align:right;}
.vstp{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:1.7rem 1.4rem;transition:all .3s;opacity:0;transform:translateY(28px);}
.vstp.vis{animation:spin .6s ease forwards;}
@keyframes spin{to{opacity:1;transform:translateY(0);}}
.vstp:hover{border-color:var(--gold);transform:translateY(-5px) !important;}
.vsico{font-size:1.9rem;margin-bottom:.7rem;}
.vstit{font-weight:700;font-size:.92rem;margin-bottom:.4rem;}
.vstx{font-size:.78rem;color:#777;line-height:1.7;}
.ibtn{display:inline-flex;align-items:center;gap:.8rem;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white;padding:1.1rem 2.8rem;border-radius:50px;font-family:"Cairo",sans-serif;font-size:1rem;font-weight:700;text-decoration:none;transition:all .3s;margin-top:3rem;animation:ig 3s ease-in-out infinite;}
@keyframes ig{0%,100%{box-shadow:0 8px 28px rgba(220,39,67,.35);}50%{box-shadow:0 15px 60px rgba(220,39,67,.65);}}
.ibtn:hover{transform:scale(1.06) translateY(-3px);}
.ibtn svg{width:22px;height:22px;fill:white;flex-shrink:0;}
/* FINALE */
#fin{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden;}
#fincan{position:absolute;inset:0;}
.finw{position:relative;z-index:2;}
.fkey{font-size:6rem;display:block;animation:kf 4s ease-in-out infinite;}
@keyframes kf{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-18px) rotate(6deg);}}
.fh{font-family:"Amiri",serif;font-size:clamp(2.5rem,8vw,7rem);font-weight:700;line-height:.92;margin-top:1.5rem;}
.fh em{font-style:normal;color:var(--red);display:block;}
.fs{margin-top:2rem;color:#888;line-height:1.9;max-width:480px;margin-inline:auto;}
.fs strong{color:var(--gold);}
footer{background:#030303;padding:3rem 2rem;text-align:center;border-top:1px solid rgba(255,255,255,.05);}
.fst{display:flex;width:90px;height:4px;margin:0 auto 1.5rem;border-radius:4px;overflow:hidden;}
.fst span{flex:1;}
.fs1{background:#111}.fs2{background:#fff}.fs3{background:#007a3d}.fs4{background:#ce1126}
footer p{color:#444;font-size:.8rem;line-height:2;}
footer strong{color:#777;}
@media(max-width:640px){.hcg{grid-template-columns:1fr;}.hci{border-left:none;border-top:1px solid rgba(255,255,255,.07);}.tlsp{display:none;}.tlev{grid-template-columns:1fr;}.tldot{display:none;}}
</style>
</head>
