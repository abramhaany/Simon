<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Simon — عالم الفراشات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--rose:#ff80b0;--lav:#b57bff;--mint:#5ce8b0;--gold:#ffd060;--peach:#ffaa70;--bg:#08040f;--dim:#8878a0;--white:#f5eeff}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Cairo',sans-serif;color:var(--white);user-select:none;touch-action:none}

#cur{display:none}

canvas{position:fixed;inset:0;display:block}
#bgC{z-index:1}
#bfC{z-index:2;pointer-events:none}
#fxC{z-index:80;pointer-events:none}
#warpC{z-index:70;pointer-events:none;opacity:0}
/* click catcher on top of bf canvas */
#clickC{position:fixed;inset:0;z-index:3;background:transparent}

/* GLOW ORBS */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);animation:orbP 12s ease-in-out infinite}
.o1{width:55vw;height:55vw;max-width:500px;max-height:500px;background:rgba(181,123,255,.09);top:-15%;right:-10%}
.o2{width:60vw;height:60vw;max-width:550px;max-height:550px;background:rgba(255,128,176,.07);bottom:-20%;left:-10%;animation-delay:-6s}
.o3{width:40vw;height:40vw;max-width:350px;max-height:350px;background:rgba(45,90,20,.12);bottom:0;left:20%;animation-delay:-3s}
@keyframes orbP{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── INTRO ── */
#intro{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(.8rem,4vw,2rem);text-align:center;transition:opacity 1s ease}
#intro.out{opacity:0;pointer-events:none}
#introC{position:absolute;inset:0;z-index:0;pointer-events:all} /* intro butterfly canvas */

.i-title{font-family:'Playfair Display';font-style:italic;font-size:clamp(2.4rem,10vw,6rem);background:linear-gradient(135deg,var(--rose),var(--lav),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:shimT 3s ease infinite;position:relative;z-index:1;line-height:1.1}
@keyframes shimT{0%,100%{background-position:0%}50%{background-position:100%}}
.i-sub{font-size:clamp(.85rem,3vw,1.1rem);color:var(--dim);margin-top:.6rem;position:relative;z-index:1;font-weight:300}
.i-q{font-size:clamp(.95rem,3vw,1.15rem);color:var(--white);font-weight:700;margin-top:clamp(1rem,3vh,2rem);position:relative;z-index:1}

#picker{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-top:.8rem;position:relative;z-index:1}
.pb{padding:.5rem 1.1rem;border-radius:50px;border:1.5px solid;background:transparent;font-family:'Cairo';font-weight:700;font-size:clamp(.78rem,3vw,.92rem);cursor:pointer;transition:all .3s;color:inherit}
.pb.sel{transform:scale(1.08);box-shadow:0 0 25px currentColor}
.pb:active{transform:scale(.94)}

.go-btn{margin-top:clamp(.8rem,2.5vh,1.5rem);padding:.8rem 2.2rem;background:linear-gradient(135deg,var(--rose),var(--lav));border:none;border-radius:50px;font-family:'Cairo';font-weight:900;font-size:clamp(.9rem,3vw,1.05rem);color:#0a050f;cursor:pointer;display:none;position:relative;z-index:1;box-shadow:0 0 30px rgba(255,128,176,.3);transition:transform .2s,box-shadow .2s}
.go-btn.show{display:block}
.go-btn:active{transform:scale(.95)}

/* ── TOP BAR ── */
#topBar{position:fixed;top:0;left:0;right:0;height:clamp(44px,8vh,60px);z-index:10;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .8s}
#topBar.show{opacity:1;pointer-events:all}
.tb-back{position:absolute;right:1rem;top:50%;transform:translateY(-50%);padding:.35rem .9rem;border:1px solid rgba(255,128,176,.3);border-radius:50px;background:rgba(255,128,176,.08);color:var(--rose);font-family:'Cairo';font-size:.78rem;font-weight:700;cursor:pointer;transition:all .25s;backdrop-filter:blur(8px)}
.tb-back:active{background:rgba(255,128,176,.2)}
.tb-name{font-family:'Playfair Display';font-style:italic;font-size:clamp(.9rem,3vw,1.15rem);color:var(--rose);text-shadow:0 0 20px var(--rose)}

/* ── HINT ── */
#hint{position:fixed;bottom:clamp(1.2rem,4vh,2.5rem);left:50%;transform:translateX(-50%);z-index:10;text-align:center;opacity:0;transition:opacity .8s;pointer-events:none;width:90%}
#hint.show{opacity:1}
#hint p{font-size:clamp(.78rem,2.5vw,.9rem);color:var(--dim);font-weight:300}
.dots{display:flex;justify-content:center;gap:5px;margin-top:.4rem}
.dot{width:4px;height:4px;border-radius:50%;animation:dp 1.4s ease-in-out infinite}
.dot:nth-child(1){background:var(--rose);animation-delay:0s}
.dot:nth-child(2){background:var(--lav);animation-delay:.2s}
.dot:nth-child(3){background:var(--mint);animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}

/* ── LABEL on hover ── */
#lbl{position:fixed;pointer-events:none;z-index:15;text-align:center;opacity:0;transition:opacity .2s;transform:translate(-50%,-130%)}
#lbl .lname{font-family:'Playfair Display';font-style:italic;font-size:clamp(.9rem,3vw,1.15rem);text-shadow:0 0 15px currentColor}
#lbl .ltap{font-size:clamp(.65rem,2vw,.75rem);color:var(--dim);margin-top:.1rem;letter-spacing:.07em}

/* ── PANEL ── */
#panel{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s}
#panel.open{opacity:1;pointer-events:all}
#panel::before{content:'';position:absolute;inset:0;background:rgba(8,4,15,.93);backdrop-filter:blur(14px)}
@media(min-height:620px) and (min-width:500px){#panel{align-items:center}}

.pbox{position:relative;z-index:1;width:min(560px,100%);border-radius:24px 24px 0 0;padding:clamp(.9rem,3vw,2rem) clamp(.9rem,3vw,1.8rem) clamp(1.2rem,4vw,2rem);text-align:center;transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.4,.64,1);overflow-y:auto;max-height:88vh;background:linear-gradient(160deg,rgba(22,10,38,.98),rgba(10,5,22,.99));border-top:1px solid rgba(255,128,176,.15);-webkit-overflow-scrolling:touch}
@media(min-height:620px) and (min-width:500px){.pbox{border-radius:24px;transform:scale(.82) translateY(55px);max-height:85vh}}
#panel.open .pbox{transform:translateY(0)}
@media(min-height:620px) and (min-width:500px){#panel.open .pbox{transform:scale(1) translateY(0)}}
.pbox::-webkit-scrollbar{width:2px}
.pbox::-webkit-scrollbar-thumb{background:rgba(255,128,176,.2);border-radius:2px}
.handle{width:34px;height:3px;border-radius:2px;background:rgba(255,255,255,.12);margin:0 auto .8rem}
.pclose{position:absolute;top:.7rem;left:.7rem;width:28px;height:28px;border:1px solid rgba(255,255,255,.12);border-radius:50%;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .2s;z-index:2}
.pclose:active{color:var(--rose);border-color:var(--rose)}
.pback2{display:inline-flex;align-items:center;gap:.35rem;margin-bottom:.8rem;padding:.38rem .85rem;border:1px solid rgba(255,255,255,.1);border-radius:50px;background:transparent;color:var(--dim);cursor:pointer;font-family:'Cairo';font-size:.75rem;font-weight:700;transition:all .2s}
.pback2:active{color:var(--rose);border-color:var(--rose)}
.p-emoji{font-size:clamp(2.2rem,8vw,3.5rem);display:block;margin:0 auto .6rem;animation:bfAnim 3s ease-in-out infinite;filter:drop-shadow(0 0 18px var(--pcol,var(--rose)))}
@keyframes bfAnim{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-12px) rotate(4deg)}}
.ptitle{font-family:'Playfair Display';font-style:italic;font-size:clamp(1.6rem,6vw,2.4rem);line-height:1.1;margin-bottom:.2rem}
.psub{font-size:clamp(.75rem,2.5vw,.85rem);color:var(--dim);margin-bottom:clamp(.9rem,3vw,1.4rem);letter-spacing:.04em}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(.4rem,2vw,.65rem);margin-bottom:clamp(.9rem,3vw,1.3rem)}
.ccard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:clamp(.65rem,2vw,.9rem) clamp(.6rem,2vw,.8rem);text-align:right;transition:all .2s}
.ccard:active{background:rgba(255,128,176,.06);border-color:rgba(255,128,176,.25)}
.ci{font-size:clamp(1.1rem,4vw,1.4rem);display:block;margin-bottom:.25rem}
.ct{font-weight:900;font-size:clamp(.75rem,2.5vw,.85rem);margin-bottom:.18rem}
.cb{font-size:clamp(.68rem,2.2vw,.77rem);color:var(--dim);line-height:1.6;font-weight:300}
.pquote{font-family:'Playfair Display';font-style:italic;font-size:clamp(.78rem,2.5vw,.88rem);line-height:1.85;border-top:1px solid rgba(255,255,255,.06);padding-top:.9rem;color:var(--gold)}
.twline{font-size:clamp(.85rem,2.8vw,.97rem);font-weight:700;min-height:1.4rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:4px}
.twc{display:inline-block;width:2px;height:1em;animation:twb .7s step-end infinite}
@keyframes twb{50%{opacity:0}}
.bbtn{border:none;font-family:'Cairo';font-weight:900;font-size:clamp(.85rem,3vw,.98rem);padding:.7rem 1.9rem;border-radius:50px;cursor:pointer;margin-top:.7rem;background:linear-gradient(135deg,var(--rose),var(--lav));color:#08040f;transition:transform .2s}
.bbtn:active{transform:scale(.95)}
</style>
</head>
<body>

<div id="cur"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>

<canvas id="bgC"></canvas>
<canvas id="bfC"></canvas>
<div id="clickC"></div>
<canvas id="warpC"></canvas>
<canvas id="fxC"></canvas>

<!-- INTRO -->
<div id="intro">
  <canvas id="introC"></canvas>
  <div class="i-title">Simon</div>
  <div class="i-sub">عالم الفراشات ✦ مرحباً بيكِ يا سيمون</div>
  <div class="i-q">إنتِ سيمون؟ اختاري فراشتك 🌸</div>
  <div id="picker">
    <button class="pb" style="color:var(--rose);border-color:var(--rose)" onclick="pick(this,'rose')">🦋 الوردية</button>
    <button class="pb" style="color:var(--lav);border-color:var(--lav)" onclick="pick(this,'lav')">💜 البنفسجية</button>
    <button class="pb" style="color:var(--mint);border-color:var(--mint)" onclick="pick(this,'mint')">🌿 الزمردية</button>
    <button class="pb" style="color:var(--gold);border-color:var(--gold)" onclick="pick(this,'gold')">✨ الذهبية</button>
  </div>
  <button class="go-btn" id="goBtn" onclick="launch()">🌸 ادخلي عالمك يا سيمون</button>
</div>

<!-- TOP BAR -->
<div id="topBar">
  <div class="tb-name">سيمون 🦋</div>
  <button class="tb-back" onclick="goHome()">🏠 الرجوع للبداية</button>
</div>

<!-- HINT -->
<div id="hint">
  <p>دوسي على أي فراشة تسافري معاها ✨</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- HOVER LABEL -->
<div id="lbl">
  <div class="lname" id="lblName">—</div>
  <div class="ltap">اضغطي للدخول</div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="pbox" id="pbox">
    <div class="handle"></div>
    <button class="pclose" onclick="closePanel()">✕</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
let W = innerWidth, H = innerHeight;
let mx = W/2, my = H/2;
let chosenColor = 'rose';
let warpActive = false, twOn = false;
let tpi = 0, tci = 0, tdel = false;

// ─── Butterfly data ───
const COLORS = {
  rose:'#ff80b0', lav:'#b57bff', mint:'#5ce8b0',
  gold:'#ffd060', peach:'#ffaa70', moon:'#c4b5fd'
};

const BF = [
  { id:'simon', name:'سيمون 🦋', color:'rose', x:.50, y:.44, r:80, speed:.018,
    data:{title:'سيمون',sub:'فراشة عسل من النوع النادر',
      cards:[{i:'🦋',t:'زي الفراشة',b:'بتيجي تضوي المكان وكأن حاجة اتغيرت'},{i:'🌸',t:'جميلة طبيعي',b:'مش محتاجة تتكلفي — الجمال ده أصيل'},{i:'⚡',t:'نفس الطاقة',b:'وحاجة فيكِ بتقول "ده الكلام" من غير ما تشرحي'},{i:'✨',t:'نادرة',b:'زي الفراشة النادرة — مش بتلاقيها كتير'}],
      quote:'"فيه ناس زي الفراشات — بمجرد ما بتيجي بتحس إن الدنيا أجمل"',tw:true,boom:false}},

  { id:'energy', name:'طاقتها 🔥', color:'lav', x:.16, y:.30, r:58, speed:.026,
    data:{title:'طاقتها',sub:'شيء مش كل الناس عنده',
      cards:[{i:'🔥',t:'بتضوي',b:'بتيجي والمكان بيتغير من غير ما تعملي حاجة'},{i:'💜',t:'معدية',b:'مبسوطيتك بتعدي لكل حاجة حواليكِ'},{i:'🌟',t:'طبيعية',b:'مش بتتكلفي، ده جزء منكِ أصيل'},{i:'🎯',t:'واضحة',b:'طاقتك بتبان قبل ما تتكلمي'}],
      quote:'"الناس اللي عندها طاقة زي دي بتخلي الدنيا أخف"',tw:false,boom:false}},

  { id:'mind', name:'فكرها 💡', color:'mint', x:.84, y:.28, r:52, speed:.031,
    data:{title:'فكرها',sub:'دماغ بتشوف الدنيا بطريقتها',
      cards:[{i:'💡',t:'زوايا مختلفة',b:'بتشوفي حاجات الناس بتعدي عليها'},{i:'🧠',t:'دماغ تانية',b:'مش بتفكري زي الناس وده أحسن حاجة'},{i:'🎲',t:'غير متوقعة',b:'الكلام معاكِ دايماً ممتع'},{i:'🌿',t:'هادية',b:'رأيك بيهدي حتى لو الكلام كتير'}],
      quote:'"الناس اللي بتشوف الدنيا بطريقة مختلفة هم اللي بيغيروها"',tw:false,boom:false}},

  { id:'smile', name:'ابتسامتها ☀️', color:'gold', x:.20, y:.68, r:62, speed:.022,
    data:{title:'ابتسامتها',sub:'بتوصل قبل ما تتكلمي',
      cards:[{i:'☀️',t:'بتضوي',b:'مش كلام — ده حرفياً اللي بيحصل'},{i:'✨',t:'طبيعية',b:'مش مزيفة — بتيجي لوحدها من قلبك'},{i:'🌟',t:'معدية',b:'لما بتبتسمي الكل بيبتسم'},{i:'💛',t:'نادرة',b:'مش كل الناس عندها الابتسامة دي'}],
      quote:'"أجمل الحاجات هي اللي بتحصل من غير تخطيط"',tw:false,boom:false}},

  { id:'friend', name:'صداقتها 🌸', color:'peach', x:.80, y:.66, r:50, speed:.028,
    data:{title:'صداقتها',sub:'النوع اللي بيفرق فعلاً',
      cards:[{i:'🤝',t:'حقيقية',b:'مش شكلية — بتحسي إنها صادقة'},{i:'🌸',t:'مريحة',b:'معاكِ مش لازم تتكلفي — بتبقي أنتِ'},{i:'⚡',t:'متشابهين',b:'نفس النكات ونفس الردود بالظبط'},{i:'🎯',t:'سعيد بيها',b:'مبسوط إني عرفتك يا سيمون'}],
      quote:'"أحسن حاجة في الحياة هي الناس اللي بتخليكِ تبقي أنتِ"',tw:false,boom:false}},

  { id:'moon', name:'القمر 🌙', color:'moon', x:.50, y:.74, r:46, speed:.035,
    data:{title:'القمر',sub:'بتضوي من غير ما تحاولي',
      cards:[{i:'🌙',t:'زي القمر',b:'حضورك بيخلي الدنيا أجمل من غير سبب'},{i:'💫',t:'هادية',b:'حضورك كافي من غير ما تعملي حاجة'},{i:'🌟',t:'ثابتة',b:'دايماً موجودة زي القمر في السما'},{i:'✨',t:'جميلة',b:'جمال طبيعي من غير تكليف'}],
      quote:'"في ناس بيكونوا زي القمر — بيخلوا كل حاجة حواليهم تبان أجمل"',tw:true,boom:true}},
];

// give each BF a phase for animation + store emoji
BF.forEach((b,i)=>{
  b.phase = i * Math.PI * .8;
  b.flapPhase = Math.random()*Math.PI*2;
  // extract emoji from name
  b.data.emoji = b.name.match(/[\u{1F300}-\u{1FFFF}]|\p{Emoji_Presentation}/gu)?.[0] || '🦋';
});

// ─── Color helpers ───
function col(key){ return COLORS[key]||'#ff80b0'; }
function hexRgb(h){ const v=parseInt(h.slice(1),16); return [(v>>16)/255,(v>>8&255)/255,(v&255)/255]; }
function hexAlpha(h,a){ const [r,g,b]=hexRgb(h); return `rgba(${~~(r*255)},${~~(g*255)},${~~(b*255)},${a})`; }

// ═══════════════════════════════════════════
// CURSOR
// ═══════════════════════════════════════════
const cur = $('cur');
function moveCur(x,y){ mx=x; my=y; cur.style.left=x+'px'; cur.style.top=y+'px'; }
document.addEventListener('mousemove', e=>moveCur(e.clientX,e.clientY));
document.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0]; moveCur(t.clientX,t.clientY); },{passive:false});
document.addEventListener('touchstart',e=>{ const t=e.touches[0]; moveCur(t.clientX,t.clientY); },{passive:true});
// ═══════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════
function resize(){
  W=innerWidth; H=innerHeight;
  [bgC,bfC,fxC,warpC].forEach(c=>{ c.width=W; c.height=H; });
  buildGarden();
  bgC._stars=null; // regenerate stars on resize
}
window.addEventListener('resize',resize);

// ═══════════════════════════════════════════
// BG CANVAS — butterfly garden world
// ═══════════════════════════════════════════
const bgC = $('bgC'), bgX = bgC.getContext('2d');

// Floating petals
let petals = [];
// Fireflies / magic orbs
let orbs = [];

function buildGarden(){

  // Floating petals drifting across
  petals = Array.from({length:35},()=>({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.6,
    vy: -(Math.random()*.5+.1),
    rot: Math.random()*Math.PI*2,
    rotV: (Math.random()-.5)*.04,
    r: Math.random()*9+4,
    col: ['#ffb0d0','#f9a8d4','#fce7f3','#ddd6fe','#bbf7d0','#fef9c3'][~~(Math.random()*6)],
    alpha: Math.random()*.5+.3,
    ph: Math.random()*Math.PI*2,
    phS: Math.random()*.015+.005
  }));

  // Fireflies / magic orbs
  orbs = Array.from({length:22},()=>({
    x: Math.random()*W, y: Math.random()*H*0.8,
    vx: (Math.random()-.5)*.4,
    vy: (Math.random()-.5)*.3,
    r: Math.random()*2.5+1,
    ph: Math.random()*Math.PI*2,
    phS: Math.random()*.03+.01,
    col: ['#ff80b0','#c084fc','#6ee7b7','#ffd060','#ffffff'][~~(Math.random()*5)]
  }));
}

let bgTime = 0;

function drawBg(){
  bgX.clearRect(0,0,W,H);
  bgTime += .016;

  // ── Sky gradient ──
  const sky = bgX.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0520');
  sky.addColorStop(0.35,'#1a0a2e');
  sky.addColorStop(0.65,'#2d1240');
  sky.addColorStop(1,'#1a2a10');
  bgX.fillStyle = sky;
  bgX.fillRect(0,0,W,H);

  // ── Stars (tiny, twinkling) ──
  if(!bgC._stars){
    bgC._stars = Array.from({length:120},()=>({
      x:Math.random()*W, y:Math.random()*H*.6,
      r:Math.random()*.9+.2, ph:Math.random()*Math.PI*2,
      sp:Math.random()*.005+.002
    }));
  }
  bgC._stars.forEach(s=>{
    s.ph+=s.sp;
    const a=(Math.sin(s.ph)+1)/2*.8+.1;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,240,255,${a})`; bgX.fill();
  });

  // ── Moon ──
  const moonX=W*.12, moonY=H*.12, moonR=Math.min(W,H)*.065;
  const moonG=bgX.createRadialGradient(moonX-moonR*.3,moonY-moonR*.3,1,moonX,moonY,moonR*1.1);
  moonG.addColorStop(0,'rgba(255,240,220,.95)');
  moonG.addColorStop(.7,'rgba(240,210,180,.7)');
  moonG.addColorStop(1,'rgba(200,150,100,0)');
  bgX.fillStyle=moonG; bgX.beginPath(); bgX.arc(moonX,moonY,moonR*1.1,0,Math.PI*2); bgX.fill();
  // moon glow
  const moonGl=bgX.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*3);
  moonGl.addColorStop(0,'rgba(255,220,180,.08)');
  moonGl.addColorStop(1,'rgba(0,0,0,0)');
  bgX.fillStyle=moonGl; bgX.fillRect(moonX-moonR*3,moonY-moonR*3,moonR*6,moonR*6);

  // ── Floating petals ──
  petals.forEach(p=>{
    p.ph+=p.phS; p.rot+=p.rotV;
    p.x+=p.vx + Math.sin(p.ph)*.4;
    p.y+=p.vy;
    if(p.y<-20) p.y=H+10;
    if(p.x<-20) p.x=W+10;
    if(p.x>W+20) p.x=-10;
    const a=p.alpha*(Math.sin(p.ph)+1)/2*.5+p.alpha*.5;
    bgX.save();
    bgX.translate(p.x,p.y); bgX.rotate(p.rot);
    bgX.beginPath();
    bgX.ellipse(0,0,p.r,p.r*.55,0,0,Math.PI*2);
    bgX.fillStyle=hexAlpha(p.col,a); bgX.fill();
    bgX.restore();
  });

  // ── Fireflies ──
  orbs.forEach(o=>{
    o.ph+=o.phS; o.x+=o.vx; o.y+=o.vy;
    if(o.x<0)o.x=W; if(o.x>W)o.x=0;
    if(o.y<0)o.y=H*.8; if(o.y>H*.8)o.y=0;
    const a=(Math.sin(o.ph)+1)/2*.8+.1;
    const g=bgX.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*4);
    g.addColorStop(0,hexAlpha(o.col,a*.9));
    g.addColorStop(.4,hexAlpha(o.col,a*.3));
    g.addColorStop(1,'rgba(0,0,0,0)');
    bgX.fillStyle=g;
    bgX.fillRect(o.x-o.r*4,o.y-o.r*4,o.r*8,o.r*8);
    bgX.beginPath(); bgX.arc(o.x,o.y,o.r,0,Math.PI*2);
    bgX.fillStyle=hexAlpha('#ffffff',a*.9); bgX.fill();
  });
}

// ═══════════════════════════════════════════
// BUTTERFLY CANVAS DRAWING (2D — reliable clicks!)
// ═══════════════════════════════════════════
const bfC = $('bfC'), bfX = bfC.getContext('2d');
let bfTime = 0;

// Draw ONE butterfly centered at (cx,cy), size r, color col, flapT ∈ [0,1]
function drawBF(cx, cy, r, hexC, flapT, alpha=1){
  const fc = flapT; // 0=closed, 1=fully open
  bfX.save();
  bfX.globalAlpha = alpha;
  bfX.translate(cx, cy);

  const wingOpen = Math.PI * .5 * fc;       // max spread angle

  // ─ helper: draw one wing side ─
  function drawWing(side){
    const sign = side === 'L' ? -1 : 1;
    bfX.save();

    // upper wing
    bfX.beginPath();
    // We build the wing using bezier, spread = wingOpen
    const ux = sign * r * .15;
    const uy = -r * .1;
    const ctrl1x = sign * r * (.2 + fc * .7);
    const ctrl1y = -r * .85;
    const ctrl2x = sign * r * (.7 + fc * .35);
    const ctrl2y = -r * .55;
    const endx   = sign * r * (.75 + fc * .35);
    const endy   = r * .05;
    const back1x = sign * r * (.3 + fc * .2);
    const back1y = r * .3;

    bfX.moveTo(0, 0);
    bfX.bezierCurveTo(ctrl1x, ctrl1y, ctrl2x, ctrl2y, endx, endy);
    bfX.bezierCurveTo(back1x, back1y, sign * r*.1, r*.2, 0, 0);

    // upper wing fill
    const gU = bfX.createRadialGradient(sign*r*.3*fc, -r*.35, r*.05, sign*r*.25*fc, -r*.15, r*.7);
    gU.addColorStop(0, hexAlpha(hexC, .95));
    gU.addColorStop(.5, hexAlpha(hexC, .78));
    gU.addColorStop(1, hexAlpha(hexC, .2));
    bfX.fillStyle = gU;
    bfX.fill();

    // upper wing white shimmer
    bfX.beginPath();
    bfX.ellipse(sign*r*(.22+fc*.15), -r*.42, r*.13, r*.09, sign*.6, 0, Math.PI*2);
    bfX.fillStyle = hexAlpha('#ffffff',.28); bfX.fill();

    // lower wing
    bfX.beginPath();
    const lx1 = sign*r*(.05+fc*.4), ly1 = r*.15;
    const lx2 = sign*r*(.6+fc*.25), ly2 = r*.35;
    const lx3 = sign*r*(.45+fc*.2), ly3 = r*.75;
    const lx4 = sign*r*.08, ly4 = r*.55;
    bfX.moveTo(0, r*.05);
    bfX.bezierCurveTo(lx1, ly1, lx2, ly2, lx3, ly3);
    bfX.bezierCurveTo(lx4, ly4, 0, r*.4, 0, r*.05);

    const gL = bfX.createRadialGradient(sign*r*.3*fc, r*.5, r*.05, sign*r*.2*fc, r*.4, r*.55);
    gL.addColorStop(0, hexAlpha(hexC, .85));
    gL.addColorStop(.6, hexAlpha(hexC, .6));
    gL.addColorStop(1, hexAlpha(hexC, .1));
    bfX.fillStyle = gL;
    bfX.fill();

    // lower wing spot
    bfX.beginPath();
    bfX.ellipse(sign*r*(.3+fc*.1), r*.55, r*.1, r*.08, 0, 0, Math.PI*2);
    bfX.fillStyle = hexAlpha('#ffffff',.2); bfX.fill();

    // ── outline / vein ──
    bfX.strokeStyle = hexAlpha('#000', .12);
    bfX.lineWidth = .8;

    // vein upper
    bfX.beginPath();
    bfX.moveTo(0,0); bfX.quadraticCurveTo(sign*r*(.4+fc*.3),-r*.5,endx,endy);
    bfX.stroke();
    bfX.beginPath();
    bfX.moveTo(0,0); bfX.quadraticCurveTo(sign*r*(.3+fc*.2),r*.5,lx3,ly3);
    bfX.stroke();

    bfX.restore();
  }

  drawWing('L');
  drawWing('R');

  // ─ body ─
  const bodyH = r * .55;
  const bodyW = r * .07;
  const bGrad = bfX.createLinearGradient(-bodyW, -bodyH*.5, bodyW, bodyH*.5);
  bGrad.addColorStop(0, hexAlpha(hexC,.9));
  bGrad.addColorStop(.5,'#1a0a22');
  bGrad.addColorStop(1, hexAlpha(hexC,.7));
  bfX.beginPath();
  bfX.ellipse(0, bodyH*.1, bodyW, bodyH*.5, 0, 0, Math.PI*2);
  bfX.fillStyle = bGrad; bfX.fill();

  // ─ head ─
  bfX.beginPath();
  bfX.arc(0, -bodyH*.5, r*.06, 0, Math.PI*2);
  bfX.fillStyle = '#1a0a22'; bfX.fill();

  // ─ antennae ─
  bfX.strokeStyle = hexAlpha(hexC, .8);
  bfX.lineWidth = 1.2;
  [[-1,1]].forEach(()=>{
    [-1,1].forEach(s=>{
      bfX.beginPath();
      bfX.moveTo(s*r*.03, -bodyH*.55);
      bfX.quadraticCurveTo(s*r*(.15+fc*.05), -bodyH*.9, s*r*(.18+fc*.08), -bodyH*1.0);
      bfX.stroke();
      // tip
      bfX.beginPath();
      bfX.arc(s*r*(.18+fc*.08), -bodyH*1.02, r*.04, 0, Math.PI*2);
      bfX.fillStyle = hexAlpha(hexC,1); bfX.fill();
    });
  });

  // ─ glow ─
  bfX.globalCompositeOperation = 'lighter';
  const gl = bfX.createRadialGradient(0,0,0,0,0,r*.8);
  gl.addColorStop(0, hexAlpha(hexC, .12));
  gl.addColorStop(1, 'rgba(0,0,0,0)');
  bfX.fillStyle = gl;
  bfX.fillRect(-r,-r,r*2,r*2);
  bfX.globalCompositeOperation = 'source-over';

  bfX.restore();
}

// ─── HIT TEST — circle-based, reliable on mobile ───
function bfAt(px, py){
  for(let i=BF.length-1;i>=0;i--){
    const b=BF[i];
    const bx=b.x*W, by=b.y*H;
    const hit = b.r * Math.max(W,H)/700 * 1.4; // generous hit radius
    const dx=px-bx, dy=py-by;
    if(dx*dx+dy*dy < hit*hit) return b;
  }
  return null;
}

// ═══════════════════════════════════════════
// MAIN DRAW LOOP
// ═══════════════════════════════════════════
let running = false;
function drawFrame(){
  requestAnimationFrame(drawFrame);
  bfTime += .016;
  drawBg(); // always draw garden bg

  bfX.clearRect(0,0,W,H);
  if(!running) return;

  BF.forEach(b=>{
    b.flapPhase += b.speed;
    // smooth figure-8 float
    const floatX = Math.sin(bfTime*.38+b.phase)*20;
    const floatY = Math.sin(bfTime*.65+b.phase*1.3)*11;
    const bx = b.x*W + floatX;
    const by = b.y*H + floatY;
    const sc = b.r * Math.min(W,H)/600;
    const flapT = (Math.sin(b.flapPhase)+1)/2;
    drawBF(bx, by, sc, col(b.color), flapT);

    // soft name label
    bfX.save();
    bfX.globalAlpha = .5;
    bfX.font = `700 ${Math.max(10,sc*.19)}px Cairo`;
    bfX.fillStyle = col(b.color);
    bfX.textAlign = 'center';
    bfX.shadowColor = col(b.color);
    bfX.shadowBlur = 8;
    bfX.fillText(b.name, bx, by + sc*1.05);
    bfX.restore();
  });

  // hover check
  const hit = bfAt(mx,my);
  const lbl = $('lbl'), ln = $('lblName');
  if(hit && !warpActive && !$('panel').classList.contains('open')){
    cur.classList.add('big');
    lbl.style.opacity='1';
    lbl.style.left=mx+'px'; lbl.style.top=my+'px';
    ln.textContent=hit.name; ln.style.color=col(hit.color);
    clickC.style.cursor='pointer';
  } else {
    cur.classList.remove('big');
    lbl.style.opacity='0';
    clickC.style.cursor='default';
  }
}

// INTRO CANVAS — animated butterflies
// ═══════════════════════════════════════════
const introC = $('introC'), iX = introC.getContext('2d');
const iCols = ['rose','lav','mint','gold','peach'];
const iBF = Array.from({length:7},(_,i)=>({
  x: .1+Math.random()*.8, y: .1+Math.random()*.8,
  vx:(Math.random()-.5)*.0012, vy:(Math.random()-.5)*.001,
  phase:Math.random()*Math.PI*2, fp:Math.random()*Math.PI*2,
  speed: .015+Math.random()*.02,
  r: .04+Math.random()*.035,
  color: iCols[i%iCols.length]
}));
let iTime=0;

function drawIntro(){
  if($('intro').classList.contains('out')) return;
  requestAnimationFrame(drawIntro);
  const iW=introC.width=innerWidth, iH=introC.height=innerHeight;
  iX.clearRect(0,0,iW,iH);
  iTime+=.016;
  iBF.forEach(b=>{
    b.fp+=b.speed;
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<.05||b.x>.95) b.vx*=-1;
    if(b.y<.05||b.y>.95) b.vy*=-1;
    const flapT=(Math.sin(b.fp)+1)/2;
    const sc=b.r*Math.min(iW,iH);
    // Use the same drawBF but on iX — need temporary swap
    const sx=iX, bxOld=bfX;
    // just draw directly with iX context
    drawBFOnCtx(iX, b.x*iW, b.y*iH, sc, col(b.color), flapT, .7);
  });
}

function drawBFOnCtx(ctx, cx, cy, r, hexC, flapT, alpha){
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(cx,cy);
  const fc=flapT;
  function dWing(s){
    ctx.save();
    const sign=s==='L'?-1:1;
    ctx.beginPath();
    const endx=sign*r*(.75+fc*.35), endy=r*.05;
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(sign*r*(.2+fc*.7),-r*.85,sign*r*(.7+fc*.35),-r*.55,endx,endy);
    ctx.bezierCurveTo(sign*r*(.3+fc*.2),r*.3,sign*r*.1,r*.2,0,0);
    const g=ctx.createRadialGradient(sign*r*.3*fc,-r*.35,r*.05,sign*r*.25*fc,-r*.15,r*.7);
    g.addColorStop(0,hexAlpha(hexC,.88));g.addColorStop(.5,hexAlpha(hexC,.7));g.addColorStop(1,hexAlpha(hexC,.15));
    ctx.fillStyle=g;ctx.fill();
    // lower
    ctx.beginPath();
    const lx3=sign*r*(.45+fc*.2),ly3=r*.75;
    ctx.moveTo(0,r*.05);ctx.bezierCurveTo(sign*r*(.05+fc*.4),r*.15,sign*r*(.6+fc*.25),r*.35,lx3,ly3);
    ctx.bezierCurveTo(sign*r*.08,r*.55,0,r*.4,0,r*.05);
    const gl=ctx.createRadialGradient(sign*r*.3*fc,r*.5,r*.05,sign*r*.2*fc,r*.4,r*.55);
    gl.addColorStop(0,hexAlpha(hexC,.78));gl.addColorStop(1,hexAlpha(hexC,.1));
    ctx.fillStyle=gl;ctx.fill();
    ctx.restore();
  }
  dWing('L');dWing('R');
  // body
  ctx.beginPath();ctx.ellipse(0,r*.1,r*.07,r*.5,0,0,Math.PI*2);ctx.fillStyle='#1a0a22';ctx.fill();
  // head
  ctx.beginPath();ctx.arc(0,-r*.5,r*.06,0,Math.PI*2);ctx.fillStyle='#1a0a22';ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════
// WARP — petal bloom portal
// ═══════════════════════════════════════════
const wC=$('warpC'), wX=wC.getContext('2d');

function doWarp(cx,cy,bfObj){
  if(warpActive)return;
  warpActive=true;
  $('hint').classList.remove('show');
  wC.width=W; wC.height=H;
  wC.style.opacity='1';
  let f=0; const total=72;
  const hexC=col(bfObj.color);
  const [cr,cg,cb]=hexRgb(hexC);

  function frame(){
    const t=f/total;
    wX.clearRect(0,0,W,H);
    // dark bg
    wX.fillStyle=`rgba(8,4,15,${Math.min(t*2.2,.95)})`;
    wX.fillRect(0,0,W,H);

    const maxR=Math.sqrt(W*W+H*H)*.8;

    // PETAL PORTALS
    const np=6;
    for(let p=0;p<np;p++){
      const ang=(p/np)*Math.PI*2+t*1.8;
      const pr=t*t*maxR*.55;
      const px=W/2+Math.cos(ang)*pr*.4, py=H/2+Math.sin(ang)*pr*.4;
      const g=wX.createRadialGradient(px,py,0,px,py,pr*(.6+t*.5));
      g.addColorStop(0,`rgba(${~~(cr*255)},${~~(cg*255)},${~~(cb*255)},${.9*Math.min(t*3,1)})`);
      g.addColorStop(.4,`rgba(${~~(cr*255)},${~~(cg*255)},${~~(cb*255)},${.4*Math.min(t*3,1)})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      wX.fillStyle=g;
      wX.save();wX.translate(px,py);wX.rotate(ang);
      wX.beginPath();wX.ellipse(0,0,pr*.5*Math.min(t*2,1),pr*.28*Math.min(t*2,1),0,0,Math.PI*2);
      wX.fill();wX.restore();
    }

    // SPEED STREAKS
    if(t>.12){
      const n=48;
      for(let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2+t*.5;
        const spd=Math.pow(t,1.5);
        const r1=maxR*.12*spd; const r2=r1+maxR*(.05+t*.1);
        const cls=i%3===0?`rgba(${~~(cr*255)},${~~(cg*255)},${~~(cb*255)},${spd*.8})`:
                  i%3===1?`rgba(200,150,255,${spd*.6})`:`rgba(255,255,255,${spd*.3})`;
        wX.strokeStyle=cls; wX.lineWidth=1.3;
        wX.beginPath();
        wX.moveTo(W/2+Math.cos(a)*r1,H/2+Math.sin(a)*r1);
        wX.lineTo(W/2+Math.cos(a)*r2,H/2+Math.sin(a)*r2);
        wX.stroke();
      }
    }

    // TUNNEL RINGS
    for(let i=0;i<10;i++){
      const ph=((i/10)+t*2.8)%1;
      const r=ph*maxR*(1+t);
      const al=Math.max(0,(1-ph)*.65)*Math.min(t*5,1);
      wX.strokeStyle=`hsla(${t*360+i*36},85%,72%,${al})`;
      wX.lineWidth=1.5+ph*5;
      wX.beginPath();wX.arc(W/2,H/2,r,0,Math.PI*2);wX.stroke();
    }

    // CENTRAL GLOW
    if(t>.25){
      const ga=Math.min((t-.25)*2.5,1);
      const g=wX.createRadialGradient(W/2,H/2,0,W/2,H/2,maxR*.55*t);
      g.addColorStop(0,`rgba(255,255,255,${ga*.95})`);
      g.addColorStop(.15,`rgba(${~~(cr*255)},${~~(cg*255)},${~~(cb*255)},${ga*.8})`);
      g.addColorStop(.5,'rgba(8,4,15,0)');
      wX.fillStyle=g;wX.fillRect(0,0,W,H);
    }
    // WHITE FLASH
    if(t>.82){ wX.fillStyle=`rgba(255,255,255,${(t-.82)*6})`; wX.fillRect(0,0,W,H); }

    f++;
    if(f<total){ requestAnimationFrame(frame); }
    else{
      wC.style.opacity='0';
      warpActive=false;
      openPanel(bfObj);
    }
  }
  frame();
}

// ═══════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════
function openPanel(bfObj){
  const box=$('pbox');
  const hexC=col(bfObj.color);
  const d=bfObj.data;

  const cards=d.cards.map(c=>`
    <div class="ccard">
      <span class="ci">${c.i}</span>
      <div class="ct" style="color:${hexC}">${c.t}</div>
      <p class="cb">${c.b}</p>
    </div>`).join('');

  box.innerHTML=`
    <div class="handle"></div>
    <button class="pclose" onclick="closePanel()">✕</button>
    <button class="pback2" onclick="closePanel()">← الرجوع للفراشات</button>
    <span class="p-emoji" style="--pcol:${hexC}">${bfObj.data.emoji||'🦋'}</span>
    <div class="ptitle" style="color:${hexC}">${d.title}</div>
    <div class="psub">${d.sub}</div>
    <div class="cgrid">${cards}</div>
    ${d.tw?`<div class="twline" style="color:${hexC}"><span id="twEl"></span><span class="twc" style="background:${hexC}"></span></div>`:''}
    <div class="pquote">${d.quote}</div>
    ${d.boom?`<button class="bbtn" onclick="boom()">🎆 احتفلي بيكِ ✨</button>`:''}
  `;

  $('panel').classList.add('open');
  if(d.tw) startTw(hexC);
}

function closePanel(){
  $('panel').classList.remove('open');
  setTimeout(()=>$('hint').classList.add('show'), 400);
  twOn=false;
}
$('panel').addEventListener('click',function(e){ if(e.target===this)closePanel(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closePanel(); });

const phrases=['مبسوطة إنكِ هنا يا سيمون 🦋','إنتِ شبهي بشكل غريب ⚡','إنتِ حلوة جداً زي الفراشة 🌸','سيمون = نادرة من أصلها 🔥','الكون اتحسن لما إنتِ فيه 🌌','مبسوط بيكِ كده ✨','مش في ناس زيكِ كتير 💫'];
function startTw(hexC){
  if(twOn)return; twOn=true; tpi=0; tci=0; tdel=false;
  const el=$('twEl'); if(!el)return; el.textContent='';
  const twc=document.querySelector('.twc'); if(twc)twc.style.background=hexC;
  twStep();
}
function twStep(){
  if(!twOn)return;
  const el=$('twEl'); if(!el){twOn=false;return;}
  const ph=phrases[tpi];
  if(!tdel){ el.textContent=ph.slice(0,++tci); if(tci===ph.length){tdel=true;setTimeout(twStep,2300);return;} }
  else{ el.textContent=ph.slice(0,--tci); if(tci===0){tdel=false;tpi=(tpi+1)%phrases.length;} }
  setTimeout(twStep,tdel?28:78);
}

// ═══════════════════════════════════════════
// FIREWORKS
// ═══════════════════════════════════════════
const fxC=$('fxC'), fX=fxC.getContext('2d');
let fp=[],fgo=false;
function rfx(){fxC.width=W;fxC.height=H;}
function burst(x,y){
  const cs=['#ff80b0','#b57bff','#5ce8b0','#ffd060','#ffaa70','#fff','#c4b5fd'];
  for(let i=0;i<140;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*13+2;fp.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*5,a:1,c:cs[~~(Math.random()*cs.length)],r:Math.random()*4+1,d:.012+Math.random()*.013,g:.12});}
}
function fxLoop(){if(!fgo)return;fX.clearRect(0,0,W,H);fp=fp.filter(p=>p.a>.01);fp.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.98;p.a-=p.d;fX.beginPath();fX.arc(p.x,p.y,p.r,0,Math.PI*2);fX.fillStyle=p.c;fX.globalAlpha=p.a;fX.fill();});fX.globalAlpha=1;requestAnimationFrame(fxLoop);}
function boom(){fgo=true;fxLoop();let n=0;const id=setInterval(()=>{burst(Math.random()*W,Math.random()*H*.75);n++;if(n>=28){clearInterval(id);setTimeout(()=>{fgo=false;fX.clearRect(0,0,W,H);},4000);}},170);}

resize();
drawFrame();
drawIntro();
